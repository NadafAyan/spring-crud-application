spring.application.name=spring-crud-application

# =====================================================================
# Database Connection (DataSource) Settings
# =====================================================================
# JDBC URL for the MySQL instance (replace 'your_database_name' with your actual database)
spring.datasource.url=jdbc:mysql://localhost:3306/company

# Database credentials
spring.datasource.username=root
spring.datasource.password=ayan@123

# =====================================================================
# JPA / Hibernate Settings
# =====================================================================
# Defines how the database schema behaves on startup (none, update, create, create-drop, validate)
spring.jpa.hibernate.ddl-auto=update

# Prints executed SQL queries to the console log
spring.jpa.show-sql=true

# Formats the printed SQL queries to make them easily readable
spring.jpa.properties.hibernate.format_sql=true
